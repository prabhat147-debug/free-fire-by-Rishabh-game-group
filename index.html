<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cyber Parkour | Dev: Rishabh Gupta</title>
    <style>
        body { 
            margin: 0; 
            background: #050505; 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            border: 4px solid #333;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.2);
        }
        canvas { background: #0a0a0f; display: block; }
        
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }
        .stat { font-size: 18px; color: #0ff; text-transform: uppercase; letter-spacing: 2px; }

        #game-over {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        h1 { color: #ff0055; font-size: 48px; margin-bottom: 0; text-shadow: 0 0 10px #ff0055; }
        .dev-credit { color: #0ff; font-size: 20px; margin: 10px 0 30px 0; font-weight: bold; border-top: 1px solid #333; padding-top: 10px; }
        .score-box { font-size: 24px; margin-bottom: 20px; }
        button { 
            background: transparent; border: 2px solid #0ff; color: #0ff; 
            padding: 12px 30px; cursor: pointer; font-size: 18px; font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #0ff; color: #000; box-shadow: 0 0 20px #0ff; }
        .controls-hint { position: absolute; bottom: 10px; right: 10px; color: #555; font-size: 12px; }
